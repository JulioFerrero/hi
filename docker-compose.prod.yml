services:
  seaweedfs:
    image: chrislusf/seaweedfs
    restart: unless-stopped
    command: server -s3 -s3.config=/config/s3.json -dir=/data -ip.bind=0.0.0.0
    volumes:
      - seaweed_data:/data
      - ./docker/seaweedfs/s3.json:/config/s3.json
    ports:
      - "${S3_PORT:-8333}:8333"
    networks:
      - internal

  postgres:
    image: postgres:alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-webbuilder}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-webbuilder}
      POSTGRES_DB: ${POSTGRES_DB:-webbuilder}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-webbuilder} -d ${POSTGRES_DB:-webbuilder}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  web:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webbuilder}:${POSTGRES_PASSWORD:-webbuilder}@postgres:5432/${POSTGRES_DB:-webbuilder}
      WEBSITE_ID: ${WEBSITE_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  editor:
    build:
      context: .
      dockerfile: ./docker/Dockerfile.editor
    restart: unless-stopped
    ports:
      - "${EDITOR_PORT:-3001}:3001"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-webbuilder}:${POSTGRES_PASSWORD:-webbuilder}@postgres:5432/${POSTGRES_DB:-webbuilder}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-images}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-secret}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      ASSET_BASE_URL: ${ASSET_BASE_URL:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3001}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    networks:
      - internal

volumes:
  pgdata:
  seaweed_data:

networks:
  internal:

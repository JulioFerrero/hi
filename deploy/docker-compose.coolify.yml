services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hi}
      POSTGRES_DB: ${POSTGRES_DB:-hi}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hi} -d ${POSTGRES_DB:-hi}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  seaweedfs:
    image: chrislusf/seaweedfs
    restart: unless-stopped
    command: server -s3 -s3.config=/config/s3.json -dir=/data -ip.bind=0.0.0.0
    volumes:
      - seaweed_data:/data
      - ./seaweedfs/s3.json:/config/s3.json
    networks:
      - internal

  editor:
    build:
      context: ${EDITOR_BUILD_CONTEXT:-..}
      dockerfile: ${EDITOR_DOCKERFILE:-deploy/Dockerfile}
    restart: unless-stopped
    environment:
      SERVICE_FQDN_EDITOR: ${SERVICE_FQDN_EDITOR:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hi}:${POSTGRES_PASSWORD:-hi}@postgres:5432/${POSTGRES_DB:-hi}
      S3_ENDPOINT: ${S3_ENDPOINT:-http://seaweedfs:8333}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-images}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-admin}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-secret}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      ASSET_BASE_URL: ${ASSET_BASE_URL:-}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      seaweedfs:
        condition: service_started
    networks:
      - internal

  web:
    build:
      context: ${WEB_BUILD_CONTEXT:-..}
      dockerfile: ${WEB_DOCKERFILE:-deploy/Dockerfile.web}
    restart: unless-stopped
    environment:
      SERVICE_FQDN_WEB: ${SERVICE_FQDN_WEB:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-hi}:${POSTGRES_PASSWORD:-hi}@postgres:5432/${POSTGRES_DB:-hi}
      WEBSITE_ID: ${WEBSITE_ID:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
  seaweed_data:

networks:
  internal:
